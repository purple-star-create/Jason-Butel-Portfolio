			["page1", { titre: "Série : Peintures Impressions - 2026", text: " *My Favourite Chapters from Charlie and the Chocolate Factory* est un projet de fin d'année de la licence pro design graphique. Cette réédition du roman de Roald Dahl m'a permis de réimaginer l'univers de Charlie en jouant avec la typo, la mise en page ainsi que l'iconographie. Je me suis amusée à faire ces choix pour montrer le contexte historique. La majorité des images sont tirées de catalogues de brocante appartenant à ma mère (qui est british). C'était un plaisir de traduire visuellement ce texte si vivant et magique que j'ai connu toute mon enfance.", content:

			], 
			index: index }],
		
			["page2", { titre: "Peintures collages - 2025", text: "Dans le cadre de la licence pro, j'ai fait une recherche documentaire sur les livres animés (livres pop-ups & autres) pour préparer mon projet de réédition *Charlie et la chocolaterie*. C'était très intéressant de trouver des références de livres avec des formes originales, puis de les organiser dans des chapitres et de les commenter. J'ai aussi beaucoup aimé la fabrication du livre en ajoutant des éléments pop-ups ainsi que du papier coloré et des rabats pour mettre en pratique toute ma recherche.", content: 
			[{ image: "images/peinture_collage/visuel_2.webp" },

			["page3", { titre: "Série Photomontages - 2018 à 2021", text: "En sortant des beaux-arts lorsque je cherchais un emploi, j'ai décidé de me lancer dans le projet de créer cet album jeunesse. J'ai vu en Angleterre qu'il existait des jardins partagés où des familles logeant en appartement pouvaient venir jardiner dans des espaces verts dédiés. C'était bien de voir qu'on pouvait être dans la nature à n'importe quelle échelle même en ville et l'impact positif que ça avait. Je me suis dit que ce serait un bon message à transmettre dans un album pour enfants. J'ai écrit l'histoire et fait des illustrations à la gouache, l'aquarelle et aux crayons de couleur.", content:

			["page6", { titre: "After The Fire - 2025", text: "*Atelier* est une bibliothèque digitale pour le design graphique où j'ai voulu rassembler toutes mes ressources car mes notes sont éparpillées dans plein de carnets différents dans la vraie vie. Ce site est constituée d'une sitothèque webdesign, une liste de fonderies typo, des outils et tutos utiles, de références artistiques et graphiques rassemblées de mes notes des beaux-arts et mes recherches sur le design graphique. *Atelier* me sert pour trouver de l'inspiration et à créer de nouveaux projets.", content:

			["page9", { titre: "Communication: Supports imprimés pour Creative Seeds - 2025", text: "Voici quelques supports imprimés de mon stage que j'ai fait pendant trois mois dans le pôle commuication de l'école d'animation 3D Creative Seeds à Cesson-Sévigné. J'ai conçu une gazette pour la communication interne de l'école. J'ai aussi créé des flyers pour les ateliers de l'école tout en utilisant l'identité visuelle de l'école et des brochures pour les deux court-métrages présentés au jury par les élèves de cinquième année.", content: 
			[{ image: "images/peintures/visuel_6bis.webp" }
			], 
			index: index }],

			["page10", { titre: "Webdesign pour Creative Seeds - 2025", text: "Pendant mon stage dans le pôle communication de l'école d'animation 3D Creative Seeds, j'ai travaillé avec la chargée de communication (ma tutrice Fabienne <3) et le développeur pour ajouter des pages au site dont : une page Ressources pour télécharger des packs gratuitement, une FAQ et une page pour télécharger les brochures sur les formations de l'école.", content:

			["page11", { titre: "Projet perso : Rapport d'activité Musée Guimet - Janvier 2026", text: "En novembre 2025, j’ai assisté à la conférence Mardis Graphiques à Rennes sur les rapports d’activité. Tous les exemples donnés m’ont inspiré à faire ma version graphique du rapport d’activité 2024 du Musée national des arts asiatiques Guimet à Paris. J’ai ajouté des touches de couleurs griffonnées, une nouvelle typo (Alegreya), un nouveau logo pour le musée et des illustrations.", content:

		<script id="page-template" type="x-tmpl-mustache">
			<div class="titre-template">{{titre}}</div>
			<div class="text-template">{{text}}</div>

			<section class="carousel">
			{{#content}}
			<div><img id="img{{index}}" class="portfolio" src="{{image}}">
			<p>{{mini_text}}</p></div>
			{{/content}}

			</section>
		</script>
		<script>
			document.addEventListener("DOMContentLoaded", function () {
				const queryString = window.location.search;
				const urlParams = new URLSearchParams(queryString);
				const page = urlParams.get('page');
				const template = document.getElementById('page-template').innerHTML;
				const rendered = Mustache.render(template, pages.get(page));
				document.getElementById('content').innerHTML = rendered;

				const images = document.querySelectorAll("img.portfolio");
				images.forEach((image, index) => {
					image.addEventListener("click", (event) => {
						modal = document.getElementById("myModal");
						modalImg = document.getElementById("modalContent");
						span = document.getElementsByClassName("close")[0];
						modal.style.display = "block";
      					modalImg.src = event.target.getAttribute("src");
      					span.onclick = function() {
      						modal = document.getElementById("myModal");
      						modal.style.display = "none";
    					}
					});
				})

				
			});
		</script>
