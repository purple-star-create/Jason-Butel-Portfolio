			["page2", { titre: "Série : Voiture - 2025", text: "Dans le cadre de la licence pro, j'ai fait une recherche documentaire sur les livres animés (livres pop-ups & autres) pour préparer mon projet de réédition *Charlie et la chocolaterie*. C'était très intéressant de trouver des références de livres avec des formes originales, puis de les organiser dans des chapitres et de les commenter. J'ai aussi beaucoup aimé la fabrication du livre en ajoutant des éléments pop-ups ainsi que du papier coloré et des rabats pour mettre en pratique toute ma recherche.", content:

		<script id="page-template" type="x-tmpl-mustache">
			<div class="titre-template">{{titre}}</div>
			<div class="text-template">{{text}}</div>

			<section class="carousel">
			{{#content}}
			<div><img id="img{{index}}" class="portfolio" src="{{image}}">
			<p>{{mini_text}}</p></div>
			{{/content}}

			</section>
		</script>
		<script>
			document.addEventListener("DOMContentLoaded", function () {
				const queryString = window.location.search;
				const urlParams = new URLSearchParams(queryString);
				const page = urlParams.get('page');
				const template = document.getElementById('page-template').innerHTML;
				const rendered = Mustache.render(template, pages.get(page));
				document.getElementById('content').innerHTML = rendered;

				const images = document.querySelectorAll("img.portfolio");
				images.forEach((image, index) => {
					image.addEventListener("click", (event) => {
						modal = document.getElementById("myModal");
						modalImg = document.getElementById("modalContent");
						span = document.getElementsByClassName("close")[0];
						modal.style.display = "block";
      					modalImg.src = event.target.getAttribute("src");
      					span.onclick = function() {
      						modal = document.getElementById("myModal");
      						modal.style.display = "none";
    					}
					});
				})

				
			});
		</script>
